name: CI/CD - receptor-boletines-expediente

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ASIASDZJGNKXRGYCVB6H
  AWS_SECRET_ACCESS_KEY: KMtJiKxY6onECohxP6DbJMSq8Ulov+rYaZACNoGF
  AWS_SESSION_TOKEN: 
  ECR_REGISTRY: 145578420911.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: receptor-boletines-739678

jobs:
  # ─────────────────────────────────────────
  # ACTIVIDAD 2: BUILD
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar sintaxis del entry point
        run: node --check index.js

  # ─────────────────────────────────────────
  # ACTIVIDAD 3: DOCKER → ECR
  # ─────────────────────────────────────────
  docker:
    name: Docker → ECR
    runs-on: ubuntu-latest
    needs: build
    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de imagen Docker
        id: push
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$IMAGE"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # ACTIVIDAD 4: DEPLOY → EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → EC2
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Desplegar en EC2 vía SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 3.82.42.34
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 \
              | docker login --username AWS --password-stdin \
                145578420911.dkr.ecr.us-east-1.amazonaws.com

            docker pull ${{ needs.docker.outputs.image }}

            docker stop receptor-boletines || true
            docker rm   receptor-boletines || true

            docker run -d \
              --name receptor-boletines \
              --restart unless-stopped \
              -e AWS_REGION=us-east-1 \
              -e AWS_ACCESS_KEY_ID=ASIASDZJGNKXRGYCVB6H \
              -e AWS_SECRET_ACCESS_KEY=KMtJiKxY6onECohxP6DbJMSq8Ulov+rYaZACNoGF \
              -e AWS_SESSION_ \
              -e SNS_EMAIL=andres.gomeztagle@iteso.mx \
              ${{ needs.docker.outputs.image }}

            sleep 5
            docker ps | grep receptor-boletines
